<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <mata name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign In Page</title>
</head>

<body>
    <header>page header</header>

    <main>
        <h1>หน้า Sign In</h1>
        <form action="/register" method="post">
            <table>
                <th>
                <td>
                    <div>
                        <label for="fname">ชื่อ</label>
                        <input type="text" id="fname" name="firstname">
                    </div>
                </td>

                <td>
                    <div>
                        <label for="lname">สกุล</label>
                        <input type="text" id="lname" name="lastname">
                    </div>
                </td>

                <td>
                    <div>
                        <label for="reg-email">username</label>
                        <input type="email" id="reg-email" name="username" placeholder="Email" required>
                    </div>
                </td>

                <td>
                    <div>
                        <label for="reg-pwd">password</label>
                        <input type="password" id="reg-pwd" name="password" placeholder="Password" required>
                    </div>
                </td>
                </th>
            </table>

            <br>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
            </tr>
            <br><br>
            <a href="login.html">กลับไปหน้า login</a>
        </form>
    </main>

    <footer>
        <hr>
        <p>page footer <br>
            <em>ที่อยู่ camt มช</em>
        </p>

            width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy">

    </footer>
</body>

</html>
